<!DOCTYPE html>
<html>
<head>
  <title>Resume Roaster 🔥</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #1a1a1a; color: #eee; }
    h1 { text-align: center; }
    textarea { width: 100%; height: 140px; margin: 10px 0; padding: 10px; box-sizing: border-box; background: #2a2a2a; color: #eee; border: 1px solid #444; border-radius: 6px; font-family: sans-serif; }
    button { width: 100%; padding: 14px; font-size: 16px; background: #e63946; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #c1121f; }
    #result { white-space: pre-wrap; background: #2a2a2a; padding: 20px; border-radius: 6px; margin-top: 20px; min-height: 40px; }
  </style>
</head>
<body>
  <h1>Resume Roaster 🔥</h1>
  <p>Paste your resume and a job description. Prepare to be judged.</p>

  <textarea id="resume" placeholder="Paste your resume here..."></textarea>
  <textarea id="jd" placeholder="Paste the job description here..."></textarea>
  <button onclick="roastMe()">Roast My Resume 🔥</button>

  <div id="result"></div>

  <script>
    async function roastMe() {
      const resultBox = document.getElementById("result");
      resultBox.textContent = "Roasting... 🔥";

      const resume = document.getElementById("resume").value;
      const jd = document.getElementById("jd").value;

      const response = await fetch("/roast", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ resume: resume, job_description: jd })
      });

      const data = await response.json();
      resultBox.textContent = data.result;
    }
  </script>
</body>
</html>
